<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
  <title>Hugo Wong · AI Assistant</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      background: #fff;
      color: #1a1a18;
    }

    /* ── Page shell ── */
    .page {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .column {
      width: 100%;
      max-width: 720px;
      height: 100%;
      display: flex;
      flex-direction: column;
      border-left: 0.5px solid #d3d1c7;
      border-right: 0.5px solid #d3d1c7;
    }

    /* ── Header ── */
    .header {
      flex-shrink: 0;
      padding: 24px 24px 20px;
      border-bottom: 0.5px solid #d3d1c7;
    }

    .header-eyebrow {
      font-size: 12px;
      color: #8a8880;
      letter-spacing: 0.02em;
      margin-bottom: 6px;
    }

    .header-title {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a18;
      letter-spacing: -0.01em;
    }

    /* ── Chat area ── */
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    /* ── Message rows ── */
    .message-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    .message-row.user {
      flex-direction: row-reverse;
    }

    /* Avatar */
    .avatar {
      flex-shrink: 0;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #2C2C2A;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      align-self: flex-end;
    }

    /* Bubble */
    .bubble {
      max-width: 75%;
      padding: 12px 15px;
      font-size: 15px;
      line-height: 1.55;
      word-break: break-word;
    }

    .message-row.ai .bubble {
      background: #F1EFE8;
      border-radius: 0 12px 12px 12px;
      color: #1a1a18;
    }

    .message-row.user .bubble {
      background: #2C2C2A;
      color: #fff;
      border-radius: 12px 0 12px 12px;
    }

    /* ── Typing indicator ── */
    .typing-dots {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 2px 1px;
    }

    .typing-dots span {
      display: block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #8a8880;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 60%, 100% { opacity: 0.25; }
      30%            { opacity: 1; }
    }

    /* ── Input area ── */
    .input-area {
      flex-shrink: 0;
      border-top: 0.5px solid #d3d1c7;
      padding: 12px 16px 16px;
    }

    /* Chips */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .chip {
      background: #fff;
      border: 0.5px solid #d3d1c7;
      border-radius: 100px;
      padding: 7px 13px;
      font-size: 13px;
      color: #3a3a38;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      min-height: 32px;
      display: flex;
      align-items: center;
      white-space: nowrap;
      font-family: inherit;
    }

    .chip:hover {
      background: #F1EFE8;
      border-color: #b8b6ae;
    }

    .chip:active {
      background: #e8e6de;
    }

    .chip:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* Input row */
    .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .text-input {
      flex: 1;
      height: 44px;
      padding: 0 14px;
      border: 0.5px solid #d3d1c7;
      border-radius: 22px;
      font-size: 15px;
      font-family: inherit;
      color: #1a1a18;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }

    .text-input::placeholder {
      color: #a8a6a0;
    }

    .text-input:focus {
      border-color: #8a8880;
    }

    .text-input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .send-btn {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #2C2C2A;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s;
    }

    .send-btn:hover  { opacity: 0.82; }
    .send-btn:active { opacity: 0.65; }

    .send-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    /* ── Markdown inside AI bubbles ── */
    .bubble ul {
      margin: 4px 0 2px 18px;
      padding: 0;
    }

    .bubble li {
      margin: 3px 0;
    }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      .column {
        border-left: none;
        border-right: none;
      }
    }

    @media (max-width: 600px) {
      html, body { font-size: 14px; }

      .header { padding: 16px 16px 14px; }
      .header-title { font-size: 18px; }

      .chat { padding: 16px; gap: 14px; }

      .bubble {
        max-width: 85%;
        font-size: 14px;
        padding: 11px 13px;
      }

      .input-area { padding: 10px 12px 14px; }

      .chip { font-size: 12.5px; padding: 6px 12px; }
    }
  </style>
</head>
<body>

<div class="page">
  <div class="column">

    <!-- Header -->
    <header class="header">
      <p class="header-eyebrow">Hugo Wong · UX Lead at HSBC</p>
      <h1 class="header-title">Ask me anything about Hugo</h1>
    </header>

    <!-- Chat -->
    <div class="chat" id="chat"></div>

    <!-- Input area -->
    <div class="input-area">
      <div class="chips" id="chips">
        <button class="chip" onclick="sendChip(this)">What projects has Hugo led?</button>
        <button class="chip" onclick="sendChip(this)">What are Hugo's key skills?</button>
        <button class="chip" onclick="sendChip(this)">How can I contact Hugo?</button>
      </div>
      <div class="input-row">
        <input
          class="text-input"
          id="input"
          type="text"
          placeholder="Ask a question about Hugo..."
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        >
        <button class="send-btn" id="sendBtn" aria-label="Send">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M3.4 20.4l17.45-7.48a1 1 0 0 0 0-1.84L3.4 3.6a1 1 0 0 0-1.39 1.06L3.5 11h8.5a.5.5 0 0 1 0 1H3.5l-1.49 6.33A1 1 0 0 0 3.4 20.4z"/>
          </svg>
        </button>
      </div>
    </div>

  </div>
</div>

<script>
  const chat    = document.getElementById('chat');
  const input   = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const chips   = document.querySelectorAll('.chip');

  // ── Markdown renderer ────────────────────────────────────

  function markdownToHTML(text) {
    function escapeHTML(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function applyInline(str) {
      // Bold first so ** isn't caught by the italic * rule
      str = str.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      str = str.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
      return str;
    }

    const lines = text.trimEnd().split('\n');
    const parts = [];
    let listItems = null;
    let textLines = [];

    function flushText() {
      if (textLines.length) { parts.push({ type: 'text', lines: [...textLines] }); textLines = []; }
    }
    function flushList() {
      if (listItems) { parts.push({ type: 'list', items: [...listItems] }); listItems = null; }
    }

    for (const line of lines) {
      const bullet = line.match(/^[*\-]\s+(.*)/);
      if (bullet) {
        flushText();
        if (!listItems) listItems = [];
        listItems.push(bullet[1]);
      } else {
        flushList();
        textLines.push(line);
      }
    }
    flushText();
    flushList();

    return parts.map(part => {
      if (part.type === 'list') {
        return '<ul>' + part.items.map(i => `<li>${applyInline(escapeHTML(i))}</li>`).join('') + '</ul>';
      }
      return part.lines.map(l => applyInline(escapeHTML(l))).join('<br>');
    }).join('');
  }

  // ── Helpers ──────────────────────────────────────────────

  function scrollToBottom() {
    chat.scrollTop = chat.scrollHeight;
  }

  function setDisabled(disabled) {
    input.disabled   = disabled;
    sendBtn.disabled = disabled;
    chips.forEach(c => { c.disabled = disabled; });
  }

  function appendMessage(role, text) {
    const row = document.createElement('div');
    row.className = `message-row ${role}`;

    if (role === 'ai') {
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = 'H';
      row.appendChild(avatar);
    }

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (role === 'ai') {
      bubble.innerHTML = markdownToHTML(text);
    } else {
      bubble.textContent = text;
    }
    row.appendChild(bubble);

    chat.appendChild(row);
    scrollToBottom();
    return row;
  }

  function appendTyping() {
    const row = document.createElement('div');
    row.className = 'message-row ai';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'H';
    row.appendChild(avatar);

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    row.appendChild(bubble);

    chat.appendChild(row);
    scrollToBottom();
    return row;
  }

  // ── Send ─────────────────────────────────────────────────

  async function send(text) {
    text = text.trim();
    if (!text) return;

    input.value = '';
    setDisabled(true);

    appendMessage('user', text);
    const typingRow = appendTyping();

    try {
      const res  = await fetch('/chat', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ message: text }),
      });

      const data = await res.json();
      typingRow.remove();

      appendMessage('ai', data.reply ?? data.error ?? 'Something went wrong. Please try again.');
    } catch {
      typingRow.remove();
      appendMessage('ai', 'Unable to reach the assistant. Please make sure the server is running.');
    } finally {
      setDisabled(false);
      input.focus();
    }
  }

  function sendChip(btn) {
    send(btn.textContent);
  }

  // ── Events ───────────────────────────────────────────────

  sendBtn.addEventListener('click', () => send(input.value));

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send(input.value);
    }
  });

  // ── Welcome message ───────────────────────────────────────

  appendMessage('ai', "Hi! I'm Hugo's AI assistant. Ask me about his experience, projects, or skills — I'm here to help you learn more about him.");
</script>

</body>
</html>
