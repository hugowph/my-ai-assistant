<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hugo Wong · AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: auto;
      overflow: hidden;
      background: #ffffff;
      color: #222;
    }

    /* ── Avatar ── */
    .avatar {
      display: block;
      width: 40px;
      height: 40px;
      image-rendering: pixelated;
      margin-bottom: 12px;
    }

    /* ── Full-viewport canvas ── */
    .page {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: unset;
      height: auto;
      padding: 40px 48px;
      background: #ffffff;
    }

    /* ── Content block ── */
    .content {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
    }

    /* ── Label ── */
    .eyebrow {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 10px;
    }

    /* ── Heading ── */
    .heading {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-style: italic;
      font-size: 52px;
      color: #111;
      line-height: 1.15;
      margin-bottom: 8px;
    }

    /* ── Subtitle ── */
    .subtitle {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 18px;
      color: #888;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    /* ── Chat area ── */
    .chat {
      width: 100%;
      max-height: 35vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 16px;
    }

    .chat::-webkit-scrollbar { width: 0; }

    /* ── AI message ── */
    .message-row.ai {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      max-width: 100%;
    }

    .ai-label {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 4px;
    }

    .bubble {
      background: #f7f6f4;
      border-radius: 4px;
      padding: 14px 18px;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 13px;
      color: #333;
      line-height: 1.85;
      word-break: break-word;
    }

    .bubble ul {
      margin: 6px 0 4px 16px;
      padding: 0;
    }

    .bubble li {
      margin: 4px 0;
    }

    /* ── User message ── */
    .message-row.user {
      display: flex;
      justify-content: flex-end;
    }

    .user-text {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 13px;
      font-style: italic;
      color: #999;
      text-align: right;
      max-width: 100%;
    }

    /* ── Typing indicator ── */
    .typing-dots {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 0;
    }

    .typing-dots span {
      display: block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #aaa;
      animation: fade 1.4s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes fade {
      0%, 60%, 100% { opacity: 0.15; }
      30%            { opacity: 0.85; }
    }

    /* ── Input ── */
    .input-wrap {
      position: relative;
      width: 100%;
    }

    .text-input {
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 50px;
      background: #ffffff;
      padding: 14px 56px 14px 22px;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 14px;
      color: #111;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    .text-input::placeholder {
      color: #bbb;
    }

    .text-input:focus {
      border-color: #aaa;
    }

    .text-input:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .send-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #111;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover  { opacity: 0.72; }
    .send-btn:active { opacity: 0.5; }

    .send-btn:disabled {
      opacity: 0.2;
      cursor: not-allowed;
    }

    .send-btn svg {
      width: 15px;
      height: 15px;
      fill: #fff;
    }

    /* ── Disclaimer ── */
    .disclaimer {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-style: italic;
      font-size: 11px;
      color: #bbb;
      margin-top: 10px;
      line-height: 1.6;
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .page {
        padding: 0 24px;
      }

      .heading {
        font-size: 38px;
      }

      .subtitle {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>

<div class="page">
  <div class="content">

    <!-- Avatar -->
    <img class="avatar" src="/avatar.png" width="40" height="40" alt="Hugo Wong">

    <!-- Heading -->
    <h1 class="heading">Meet Hugo's AI</h1>

    <!-- Subtitle -->
    <p class="subtitle">Ask anything about his experience, projects, and skills</p>

    <!-- Chat -->
    <div class="chat" id="chat"></div>

    <!-- Input -->
    <div class="input-wrap">
      <input
        class="text-input"
        id="input"
        type="text"
        placeholder="Type your question or prompt..."
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      >
      <button class="send-btn" id="sendBtn" aria-label="Send">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M3.4 20.4l17.45-7.48a1 1 0 0 0 0-1.84L3.4 3.6a1 1 0 0 0-1.39 1.06L3.5 11h8.5a.5.5 0 0 1 0 1H3.5l-1.49 6.33A1 1 0 0 0 3.4 20.4z"/>
        </svg>
      </button>
    </div>

    <!-- Disclaimer -->
    <p class="disclaimer">Hugo's assistant can make mistakes. Consider checking important information.</p>

  </div>
</div>

<script>
  const chat    = document.getElementById('chat');
  const input   = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');

  // ── Markdown renderer ────────────────────────────────────

  function markdownToHTML(text) {
    function escapeHTML(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function applyInline(str) {
      str = str.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      str = str.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
      return str;
    }

    const lines = text.trimEnd().split('\n');
    const parts = [];
    let listItems = null;
    let textLines = [];

    function flushText() {
      if (textLines.length) { parts.push({ type: 'text', lines: [...textLines] }); textLines = []; }
    }
    function flushList() {
      if (listItems) { parts.push({ type: 'list', items: [...listItems] }); listItems = null; }
    }

    for (const line of lines) {
      const bullet = line.match(/^[*\-]\s+(.*)/);
      if (bullet) {
        flushText();
        if (!listItems) listItems = [];
        listItems.push(bullet[1]);
      } else {
        flushList();
        textLines.push(line);
      }
    }
    flushText();
    flushList();

    return parts.map(part => {
      if (part.type === 'list') {
        return '<ul>' + part.items.map(i => `<li>${applyInline(escapeHTML(i))}</li>`).join('') + '</ul>';
      }
      return part.lines.map(l => applyInline(escapeHTML(l))).join('<br>');
    }).join('');
  }

  // ── Helpers ──────────────────────────────────────────────

  function scrollToBottom() {
    chat.scrollTop = chat.scrollHeight;
  }

  function setDisabled(disabled) {
    input.disabled   = disabled;
    sendBtn.disabled = disabled;
  }

  function appendMessage(role, text) {
    const row = document.createElement('div');
    row.className = `message-row ${role}`;

    if (role === 'ai') {
      const label = document.createElement('div');
      label.className = 'ai-label';
      label.textContent = "Hugo's AI";
      row.appendChild(label);

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = markdownToHTML(text);
      row.appendChild(bubble);
    } else {
      const userText = document.createElement('div');
      userText.className = 'user-text';
      userText.textContent = text;
      row.appendChild(userText);
    }

    chat.appendChild(row);
    scrollToBottom();
    return row;
  }

  function appendTyping() {
    const row = document.createElement('div');
    row.className = 'message-row ai';

    const label = document.createElement('div');
    label.className = 'ai-label';
    label.textContent = "Hugo's AI";
    row.appendChild(label);

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    row.appendChild(bubble);

    chat.appendChild(row);
    scrollToBottom();
    return row;
  }

  // ── Send ─────────────────────────────────────────────────

  async function send(text) {
    text = text.trim();
    if (!text) return;

    input.value = '';
    setDisabled(true);

    appendMessage('user', text);
    const typingRow = appendTyping();

    try {
      const res = await fetch('https://my-ai-assistant-neon.vercel.app/chat', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ message: text }),
      });

      const data = await res.json();
      typingRow.remove();

      appendMessage('ai', data.reply ?? data.error ?? 'Something went wrong. Please try again.');
    } catch {
      typingRow.remove();
      appendMessage('ai', 'Unable to reach the assistant. Please make sure the server is running.');
    } finally {
      setDisabled(false);
      input.focus();
    }
  }

  // ── Events ───────────────────────────────────────────────

  sendBtn.addEventListener('click', () => send(input.value));

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send(input.value);
    }
  });
</script>

</body>
</html>
