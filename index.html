<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hugo Wong · AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      color: #222;
    }

    /* ── Page shell ── */
    .page {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: #ffffff;
    }

    .column {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      flex-shrink: 0;
      padding: 40px 40px 28px;
      background: #ffffff;
    }

    .header-eyebrow {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 12px;
    }

    .header-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-style: italic;
      font-size: 28px;
      letter-spacing: 0.08em;
      color: #111;
      line-height: 1.2;
    }

    .header-rule {
      margin-top: 28px;
      border: none;
      border-top: 1px solid #ebebeb;
    }

    /* ── Chat area ── */
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 32px 40px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      scroll-behavior: smooth;
    }

    /* ── Message rows ── */
    .message-row {
      display: flex;
      align-items: flex-end;
      gap: 12px;
    }

    .message-row.user {
      flex-direction: row-reverse;
    }

    /* Avatar */
    .avatar {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #111;
      color: #fff;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      justify-content: center;
      align-self: flex-end;
    }

    /* Bubble */
    .bubble {
      max-width: 75%;
      padding: 14px 18px;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 14px;
      line-height: 1.8;
      word-break: break-word;
    }

    .message-row.ai .bubble {
      background: #f7f6f4;
      border-radius: 2px;
      color: #333;
    }

    .message-row.user .bubble {
      background: #111;
      color: #ffffff;
      border-radius: 2px;
    }

    /* ── Markdown inside AI bubbles ── */
    .bubble ul {
      margin: 6px 0 4px 16px;
      padding: 0;
    }

    .bubble li {
      margin: 4px 0;
    }

    /* ── Typing indicator ── */
    .typing-dots {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 0;
    }

    .typing-dots span {
      display: block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #999;
      animation: fade 1.4s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes fade {
      0%, 60%, 100% { opacity: 0.15; }
      30%            { opacity: 0.9; }
    }

    /* ── Input area ── */
    .input-area {
      flex-shrink: 0;
      border-top: 1px solid #ebebeb;
      padding: 20px 40px 32px;
      background: #ffffff;
    }

    /* Chips */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .chip {
      background: #ffffff;
      border: 1px solid #ddd;
      border-radius: 100px;
      padding: 6px 14px;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: #666;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      min-height: 30px;
      display: flex;
      align-items: center;
      white-space: nowrap;
    }

    .chip:hover {
      border-color: #aaa;
      color: #333;
    }

    .chip:active {
      border-color: #111;
      color: #111;
    }

    .chip:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* Input row */
    .input-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .text-input {
      flex: 1;
      height: 44px;
      padding: 0 16px;
      border: 1px solid #ebebeb;
      border-radius: 0;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 14px;
      color: #222;
      background: #ffffff;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    .text-input::placeholder {
      color: #bbb;
      font-weight: 300;
    }

    .text-input:focus {
      border-color: #bbb;
    }

    .text-input:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .send-btn {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #111;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
    }

    .send-btn:hover  { opacity: 0.75; }
    .send-btn:active { opacity: 0.55; }

    .send-btn:disabled {
      opacity: 0.2;
      cursor: not-allowed;
    }

    .send-btn svg {
      width: 16px;
      height: 16px;
      fill: #fff;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .header { padding: 28px 20px 20px; }
      .header-title { font-size: 24px; }

      .chat { padding: 24px 20px; gap: 20px; }

      .bubble {
        max-width: 88%;
        padding: 12px 15px;
      }

      .input-area { padding: 16px 20px 24px; }

      .chip { font-size: 10.5px; }
    }
  </style>
</head>
<body>

<div class="page">
  <div class="column">

    <!-- Header -->
    <header class="header">
      <p class="header-eyebrow">Hugo Wong · UX Lead at HSBC</p>
      <h1 class="header-title">Ask me anything about Hugo</h1>
      <hr class="header-rule">
    </header>

    <!-- Chat -->
    <div class="chat" id="chat"></div>

    <!-- Input area -->
    <div class="input-area">
      <div class="chips" id="chips">
        <button class="chip" onclick="sendChip(this)">What has Hugo built at HSBC?</button>
        <button class="chip" onclick="sendChip(this)">Tell me about Hugo's design process</button>
        <button class="chip" onclick="sendChip(this)">How can I get in touch?</button>
      </div>
      <div class="input-row">
        <input
          class="text-input"
          id="input"
          type="text"
          placeholder="Ask a question about Hugo..."
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        >
        <button class="send-btn" id="sendBtn" aria-label="Send">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M3.4 20.4l17.45-7.48a1 1 0 0 0 0-1.84L3.4 3.6a1 1 0 0 0-1.39 1.06L3.5 11h8.5a.5.5 0 0 1 0 1H3.5l-1.49 6.33A1 1 0 0 0 3.4 20.4z"/>
          </svg>
        </button>
      </div>
    </div>

  </div>
</div>

<script>
  const chat    = document.getElementById('chat');
  const input   = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const chips   = document.querySelectorAll('.chip');

  // ── Markdown renderer ────────────────────────────────────

  function markdownToHTML(text) {
    function escapeHTML(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function applyInline(str) {
      // Bold first so ** isn't caught by the italic * rule
      str = str.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      str = str.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
      return str;
    }

    const lines = text.trimEnd().split('\n');
    const parts = [];
    let listItems = null;
    let textLines = [];

    function flushText() {
      if (textLines.length) { parts.push({ type: 'text', lines: [...textLines] }); textLines = []; }
    }
    function flushList() {
      if (listItems) { parts.push({ type: 'list', items: [...listItems] }); listItems = null; }
    }

    for (const line of lines) {
      const bullet = line.match(/^[*\-]\s+(.*)/);
      if (bullet) {
        flushText();
        if (!listItems) listItems = [];
        listItems.push(bullet[1]);
      } else {
        flushList();
        textLines.push(line);
      }
    }
    flushText();
    flushList();

    return parts.map(part => {
      if (part.type === 'list') {
        return '<ul>' + part.items.map(i => `<li>${applyInline(escapeHTML(i))}</li>`).join('') + '</ul>';
      }
      return part.lines.map(l => applyInline(escapeHTML(l))).join('<br>');
    }).join('');
  }

  // ── Helpers ──────────────────────────────────────────────

  function scrollToBottom() {
    chat.scrollTop = chat.scrollHeight;
  }

  function setDisabled(disabled) {
    input.disabled   = disabled;
    sendBtn.disabled = disabled;
    chips.forEach(c => { c.disabled = disabled; });
  }

  function appendMessage(role, text) {
    const row = document.createElement('div');
    row.className = `message-row ${role}`;

    if (role === 'ai') {
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = 'H';
      row.appendChild(avatar);
    }

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (role === 'ai') {
      bubble.innerHTML = markdownToHTML(text);
    } else {
      bubble.textContent = text;
    }
    row.appendChild(bubble);

    chat.appendChild(row);
    scrollToBottom();
    return row;
  }

  function appendTyping() {
    const row = document.createElement('div');
    row.className = 'message-row ai';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'H';
    row.appendChild(avatar);

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    row.appendChild(bubble);

    chat.appendChild(row);
    scrollToBottom();
    return row;
  }

  // ── Send ─────────────────────────────────────────────────

  async function send(text) {
    text = text.trim();
    if (!text) return;

    input.value = '';
    setDisabled(true);

    appendMessage('user', text);
    const typingRow = appendTyping();

    try {
      const res  = await fetch('https://my-ai-assistant-neon.vercel.app/chat', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ message: text }),
      });

      const data = await res.json();
      typingRow.remove();

      appendMessage('ai', data.reply ?? data.error ?? 'Something went wrong. Please try again.');
    } catch {
      typingRow.remove();
      appendMessage('ai', 'Unable to reach the assistant. Please make sure the server is running.');
    } finally {
      setDisabled(false);
      input.focus();
    }
  }

  function sendChip(btn) {
    send(btn.textContent);
  }

  // ── Events ───────────────────────────────────────────────

  sendBtn.addEventListener('click', () => send(input.value));

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send(input.value);
    }
  });

  // ── Welcome message ───────────────────────────────────────

  appendMessage('ai', "Hello. I'm Hugo's personal assistant. Ask me anything about his experience, projects, or approach to design.");
</script>

</body>
</html>
